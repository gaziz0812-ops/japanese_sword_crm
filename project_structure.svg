<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="920" viewBox="0 0 1450 920">
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #5b6475; }
      .box { fill: #ffffff; stroke: #b8c0d4; stroke-width: 2; rx: 8; }
      .main { fill: #eef5ff; stroke: #4c7bd9; }
      .stock { fill: #eefbf3; stroke: #36a866; }
      .sales { fill: #fff5e8; stroke: #dd8a21; }
      .text { font: 600 16px Arial, sans-serif; fill: #172033; }
      .small { font: 400 13px Arial, sans-serif; fill: #5b6475; }
      .line { fill: none; stroke: #7b8497; stroke-width: 2; marker-end: url(#arrow); }
      .line-blue { fill: none; stroke: #4c7bd9; stroke-width: 2.4; marker-end: url(#arrowBlue); }
      .line-green { fill: none; stroke: #36a866; stroke-width: 2.4; marker-end: url(#arrowGreen); }
      .line-orange { fill: none; stroke: #dd8a21; stroke-width: 2.4; marker-end: url(#arrowOrange); }
      .label { font: 400 12px Arial, sans-serif; fill: #3f4758; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8497"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4c7bd9"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#36a866"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dd8a21"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1450" height="920"/>
  <text class="title" x="50" y="55">Структура связей проекта</text>
  <text class="subtitle" x="50" y="82">Товар в центре системы; склад хранит партии и журнал движений; продажи, поставки, списания и резервы создают складские события.</text>

  <rect class="box main" x="565" y="135" width="250" height="82"/>
  <text class="text" x="690" y="168" text-anchor="middle">Product</text>
  <text class="small" x="690" y="192" text-anchor="middle">Товар</text>

  <rect class="box" x="60" y="145" width="230" height="72"/>
  <text class="text" x="175" y="174" text-anchor="middle">Manufacturer</text>
  <text class="small" x="175" y="197" text-anchor="middle">Производитель</text>

  <rect class="box" x="60" y="330" width="230" height="72"/>
  <text class="text" x="175" y="359" text-anchor="middle">Supply</text>
  <text class="small" x="175" y="382" text-anchor="middle">Поставка</text>

  <rect class="box" x="345" y="330" width="230" height="72"/>
  <text class="text" x="460" y="359" text-anchor="middle">SupplyItem</text>
  <text class="small" x="460" y="382" text-anchor="middle">Позиция поставки</text>

  <rect class="box" x="60" y="455" width="230" height="72"/>
  <text class="text" x="175" y="484" text-anchor="middle">ManualSupply</text>
  <text class="small" x="175" y="507" text-anchor="middle">Ручная поставка</text>

  <rect class="box" x="345" y="455" width="230" height="72"/>
  <text class="text" x="460" y="484" text-anchor="middle">ManualSupplyItem</text>
  <text class="small" x="460" y="507" text-anchor="middle">Ручная позиция</text>

  <rect class="box stock" x="565" y="305" width="250" height="82"/>
  <text class="text" x="690" y="338" text-anchor="middle">StockBatch</text>
  <text class="small" x="690" y="362" text-anchor="middle">Партия товара / FIFO</text>

  <rect class="box stock" x="565" y="525" width="250" height="82"/>
  <text class="text" x="690" y="558" text-anchor="middle">StockMovement</text>
  <text class="small" x="690" y="582" text-anchor="middle">Журнал движений склада</text>

  <rect class="box sales" x="945" y="145" width="250" height="82"/>
  <text class="text" x="1070" y="178" text-anchor="middle">Sale</text>
  <text class="small" x="1070" y="202" text-anchor="middle">Продажа / заказ</text>

  <rect class="box" x="1225" y="145" width="200" height="72"/>
  <text class="text" x="1325" y="174" text-anchor="middle">User</text>
  <text class="small" x="1325" y="197" text-anchor="middle">Покупатель</text>

  <rect class="box sales" x="945" y="305" width="250" height="82"/>
  <text class="text" x="1070" y="338" text-anchor="middle">SaleCostAllocation</text>
  <text class="small" x="1070" y="362" text-anchor="middle">Из какой партии продали</text>

  <rect class="box sales" x="945" y="465" width="250" height="82"/>
  <text class="text" x="1070" y="498" text-anchor="middle">SaleReturn</text>
  <text class="small" x="1070" y="522" text-anchor="middle">Возврат по заказу</text>

  <rect class="box stock" x="345" y="665" width="250" height="82"/>
  <text class="text" x="470" y="698" text-anchor="middle">StockWriteOff</text>
  <text class="small" x="470" y="722" text-anchor="middle">Списание товара</text>

  <rect class="box stock" x="60" y="790" width="270" height="72"/>
  <text class="text" x="195" y="819" text-anchor="middle">StockWriteOffAllocation</text>
  <text class="small" x="195" y="842" text-anchor="middle">Списание из партий</text>

  <rect class="box stock" x="785" y="665" width="250" height="82"/>
  <text class="text" x="910" y="698" text-anchor="middle">StockReservation</text>
  <text class="small" x="910" y="722" text-anchor="middle">Резерв товара</text>

  <rect class="box stock" x="1065" y="790" width="290" height="72"/>
  <text class="text" x="1210" y="819" text-anchor="middle">StockReservationAllocation</text>
  <text class="small" x="1210" y="842" text-anchor="middle">Резерв из партий</text>

  <path class="line-blue" d="M 290 181 L 565 176"/>
  <text class="label" x="378" y="164">производитель товара</text>

  <path class="line" d="M 290 366 L 345 366"/>
  <text class="label" x="305" y="352">позиции</text>
  <path class="line-blue" d="M 575 366 C 610 330 635 260 660 217"/>

  <path class="line" d="M 290 491 L 345 491"/>
  <text class="label" x="300" y="477">позиции</text>
  <path class="line-blue" d="M 575 491 C 625 435 650 285 675 217"/>

  <path class="line-green" d="M 690 217 L 690 305"/>
  <text class="label" x="705" y="263">партии товара</text>

  <path class="line-green" d="M 690 387 L 690 525"/>
  <text class="label" x="705" y="463">движения склада</text>

  <path class="line-orange" d="M 815 176 L 945 186"/>
  <text class="label" x="842" y="162">продается</text>
  <path class="line" d="M 1225 181 L 1195 181"/>
  <text class="label" x="1202" y="164">покупатель</text>

  <path class="line-orange" d="M 1070 227 L 1070 305"/>
  <text class="label" x="1085" y="268">партии продажи</text>
  <path class="line-green" d="M 945 346 L 815 346"/>
  <text class="label" x="840" y="330">ссылка на партию</text>

  <path class="line-orange" d="M 1070 387 L 1070 465"/>
  <text class="label" x="1085" y="430">возвраты</text>

  <path class="line-green" d="M 610 217 C 520 340 490 545 470 665"/>
  <text class="label" x="435" y="610">списания</text>
  <path class="line-green" d="M 470 747 C 405 790 340 815 330 826"/>
  <path class="line-green" d="M 330 826 C 430 770 545 575 640 387"/>
  <text class="label" x="365" y="785">из каких партий</text>

  <path class="line-green" d="M 780 217 C 875 355 910 520 910 665"/>
  <text class="label" x="925" y="610">резервы</text>
  <path class="line-green" d="M 910 747 C 975 790 1050 815 1065 826"/>
  <path class="line-green" d="M 1065 826 C 965 770 840 575 740 387"/>
  <text class="label" x="1010" y="785">из каких партий</text>

  <path class="line" d="M 460 402 C 480 485 555 535 565 550"/>
  <path class="line" d="M 460 527 C 500 565 535 570 565 570"/>
  <path class="line" d="M 945 205 C 845 320 770 470 740 525"/>
  <path class="line" d="M 945 506 C 850 525 815 540 815 555"/>
  <path class="line" d="M 595 706 C 630 660 660 625 675 607"/>
  <path class="line" d="M 785 706 C 750 660 720 625 705 607"/>

  <rect class="box" x="50" y="40" width="0" height="0" opacity="0"/>
</svg>
