services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - static_data:/app/japanese_sword/staticfiles
      - media_data:/app/japanese_sword/media
    command: gunicorn japanese_sword.wsgi:application --bind 0.0.0.0:8000

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    network_mode: host
    command: python -m telegram_bot.main
    working_dir: /app/japanese_sword

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/dist
    command: sh -c "rm -rf /dist/* && cp -r /app/dist/. /dist"

  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/frontend:ro
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  static_data:
  media_data:
  frontend_dist:
  caddy_data:
  caddy_config:
